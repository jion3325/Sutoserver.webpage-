<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>

<header class="header">

  <!-- ロゴ -->
  <a href="{{ '/' | relative_url }}">
    <img src="/assets/images/logo.png" class="logo">
  </a>

  <!-- ☰ -->
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>

  <!-- ナビ -->
  <nav id="nav-menu">
    <a href="{{ '/' | relative_url }}">ホーム</a>
    <a href="{{ '/staff' | relative_url }}">運営募集</a>
    <a href="{{ '/news' | relative_url }}">ニュース</a>
    <a href="{{ '/tags' | relative_url }}">タグ</a>
    <a href="{{ '/Koka' | relative_url }}">国家サーバー</a>
    <a href="{{ '/ana-ki-' | relative_url }}">アナーキー</a>
  </nav>

</header>

<main style="padding:20px;">
  {{ content }}
</main>

<script>
function toggleMenu() {
  document.getElementById("nav-menu").classList.toggle("active");
}
</script>

</body>
</html>
